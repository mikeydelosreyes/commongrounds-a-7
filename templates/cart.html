<h2>Your Cart</h2>

{% for owner, transactions in grouped_transactions.items %}
    <h3>Seller: {{ owner.username }}</h3>
    <ul>
        {% for tx in transactions %}
            <li>
                {{ tx.product.name }} - {{ tx.get_status_display }}
                (Quantity: {{ tx.quantity }})
            </li>
        {% endfor %}
    </ul>
{% empty %}
    <p>No transactions yet.</p>
{% endfor %}
