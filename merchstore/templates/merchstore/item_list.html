{% extends 'merchstore/base_merchstore.html' %}
{% load static %}

{% block header %}<h1>Product List</h1>{% endblock %}
{% block content %}
    <ul>
        {% for product in product_list %}
            <li><a href ="{{ product.get_absolute_url }}">
            {{ product.name }} - {{ product.price }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
