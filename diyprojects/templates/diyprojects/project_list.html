{% extends 'diyprojects/base_diyprojects.html' %}
{% load static %}

{% block header %}<h1>Project List</h1>{% endblock %}
{% block content %}
    <ul>
        {% for project in project_list %}
            <li>                
                <a href="{{project.get_absolute_url}}">
                {{project.title}} - {{ project.created_on|date:"Y-m-d"}}</a>                
            </li>
        {% endfor %}
    </ul>
{% endblock %}
