{% extends 'localevents/base_localevents.html' %}
{% load static %}

{% block header %}<h1>Event List</h1>{% endblock %}
{% block content %}
    <ul>
        {% for event in event_list %}
            <li><a href ="{{ event.get_absolute_url }}">
            {{ event.title }} - {{ event.created_on|date:"Y-m-d" }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
