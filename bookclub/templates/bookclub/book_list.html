{% extends 'bookclub/base_bookclub.html' %}

{% block header %}<h1>Book List</h1>{% endblock %}
{% block content %}

            {{ book.title }} - {{ book.publication_year }}</a></li>
        {% endfor %}
    </ul>

{% endblock %}
